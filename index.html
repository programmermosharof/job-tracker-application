<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Css File Connect -->
     <link rel="stylesheet" href="Style/index.css">

      <!-- Font   -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <title>Job-Tracker</title>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 text-slate-800">

    <!-- Header Section -->
     <header>
        <h1 class="font-bold text-3xl text-[#002C5C] mb-6">Job Application Tracker</h1>
        <div id="" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm ">
                <p class="text-sm font-medium text-slate-500">Total</p>
                <p id="total-count" class="text-3xl font-bold">0</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm ">
                <p class="text-sm font-medium text-slate-500">Interview</p>
                <p  id="interview-count" class="text-3xl font-bold text-green-600">0</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm ">
                <p class="text-sm font-medium text-slate-500">Rejected</p>
                <p  id="rejected-count" class="text-3xl font-bold text-red-600">0</p>
            </div>
        </div>

        <div class="flex justify-between">
            <h2 class="text-2xl font-bold">Available Jobs</h2>
            <p class="font-bold text-1xl">8 Job</p>
        </div>
        <!-- Button Section -->
         <div class="mt-4">
            <button class="btn mr-4">All</button>
            <button class="btn mr-4">Interview</button>
            <button class="btn mr-4">Rejected</button>
         </div>
     </header>


    <!-- JavaScript File Connect -->
    <script src="JavaScript/index.js"></script>
</body>
</html>
