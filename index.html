<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Css File Connect -->
     <link rel="stylesheet" href="Style/index.css">

      <!-- Font   -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
   
          <!-- Font Awesome > For icon  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <title>Job-Tracker</title>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 text-slate-800">

    <!-- Header Section -->
     <header>
        <h1 class="font-bold text-3xl text-[#002C5C] mb-6">Job Application Tracker</h1>
        <div id="" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm ">
                <p class="text-sm font-medium text-slate-500">Total</p>
                <p id="total-count" class="text-3xl font-bold">0</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm ">
                <p class="text-sm font-medium text-slate-500">Interview</p>
                <p  id="interview-count" class="text-3xl font-bold text-green-600">0</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm ">
                <p class="text-sm font-medium text-slate-500">Rejected</p>
                <p  id="rejected-count" class="text-3xl font-bold text-red-600">0</p>
            </div>
        </div>

        <div class="flex justify-between">
            <h2 class="text-2xl font-bold">Available Jobs</h2>
            <p class="btn font-bold text-1xl ">8 Job</p>
        </div>
        <!-- Button Section -->
         <div class="mt-4">
            <button class="btn mr-4">All</button>
            <button class="btn mr-4">Interview</button>
            <button class="btn mr-4">Rejected</button>
         </div>
     </header>
     <main>
        <!-- Card Section -->
         <div class="shadow-xl p-8 rounded-[16px] space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl text-[#002c5c] font-bold">Mobile First Corp</h2>
                <button class="btn rounded-full"><i class="fa-solid fa-trash-can"></i></button>
            </div>
            <p class="font-bold">React Native Developer</p>
            <p class="">Remote • Full-time • $130,000 - $175,000</p>
            <button class="btn">Not Applied</button>
            <p>Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>
            <div >
                <button class="btn mr-4">interview</button>
                <button class="btn">Rejected</button>
            </div>
         </div>
         
        
     </main>


    <!-- JavaScript File Connect -->
    <script src="JavaScript/index.js"></script>
</body>
</html>
